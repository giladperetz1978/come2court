name: Deploy Backend To Contabo VPS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-contabo.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy application on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          APPROVED_EMAILS: ${{ secrets.APPROVED_EMAILS }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          envs: GOOGLE_CLIENT_ID,APPROVED_EMAILS,ADMIN_EMAILS,ADMIN_USERNAME,ADMIN_PASSWORD
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            PUBLIC_APP_DOMAIN=come2court.com
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y curl git ca-certificates gnupg
              if ! command -v node >/dev/null 2>&1; then
                curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
                apt-get install -y nodejs
              fi
              if ! command -v caddy >/dev/null 2>&1; then
                apt-get install -y debian-keyring debian-archive-keyring apt-transport-https
                mkdir -p /etc/apt/keyrings
                curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key | gpg --dearmor -o /etc/apt/keyrings/caddy-stable-archive-keyring.gpg
                curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt | tee /etc/apt/sources.list.d/caddy-stable.list
                apt-get update -y
                apt-get install -y caddy
              fi
              mkdir -p /etc/caddy/Caddyfile.d
              printf '%s\n' 'import /etc/caddy/Caddyfile.d/*.conf' > /etc/caddy/Caddyfile
            fi
            mkdir -p ~/apps/come2court
            cd ~/apps/come2court
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi
            git remote set-url origin https://github.com/${{ github.repository }}.git
            git fetch --depth=1 origin main
            git reset --hard origin/main
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi
            if command -v ufw >/dev/null 2>&1; then
              ufw allow 22/tcp || true
              ufw allow 8787/tcp || true
              ufw allow 80/tcp || true
              ufw allow 443/tcp || true
            elif command -v firewall-cmd >/dev/null 2>&1; then
              firewall-cmd --permanent --add-port=22/tcp || true
              firewall-cmd --permanent --add-port=8787/tcp || true
              firewall-cmd --permanent --add-port=80/tcp || true
              firewall-cmd --permanent --add-port=443/tcp || true
              firewall-cmd --reload || true
            fi
            cd ~/apps/come2court/frontend
            npm ci
            npm run build
            cd ~/apps/come2court/backend
            touch .env
            upsert_env() {
              key="$1"
              value="$2"
              awk -v key="$key" -v value="$value" '
                BEGIN { updated = 0 }
                index($0, key "=") == 1 {
                  print key "=" value
                  updated = 1
                  next
                }
                { print }
                END {
                  if (!updated) {
                    print key "=" value
                  }
                }
              ' .env > .env.tmp && mv .env.tmp .env
            }
            if [ -n "$GOOGLE_CLIENT_ID" ]; then upsert_env GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"; fi
            if [ -n "$APPROVED_EMAILS" ]; then upsert_env APPROVED_EMAILS "$APPROVED_EMAILS"; fi
            if [ -n "$ADMIN_EMAILS" ]; then upsert_env ADMIN_EMAILS "$ADMIN_EMAILS"; fi
            if [ -n "$ADMIN_USERNAME" ]; then upsert_env ADMIN_USERNAME "$ADMIN_USERNAME"; fi
            if [ -n "$ADMIN_PASSWORD" ]; then upsert_env ADMIN_PASSWORD "$ADMIN_PASSWORD"; fi
            upsert_env PORT "8788"
            upsert_env FRONTEND_ORIGIN "https://$PUBLIC_APP_DOMAIN,http://localhost:5173"
            npm ci --omit=dev
            pm2 delete come2court-backend || true
            pm2 start ~/apps/come2court/backend/server.js --name come2court-backend
            pm2 save
            mkdir -p /etc/caddy/Caddyfile.d
            printf '%s\n' 'come2court.com {' '  reverse_proxy 127.0.0.1:8788' '}' > /etc/caddy/Caddyfile.d/come2court.conf
            systemctl enable caddy || true
            systemctl restart caddy
            HEALTH_OK=0
            for i in $(seq 1 20); do
              if curl --silent --fail http://127.0.0.1:8788/api/health >/dev/null 2>&1; then
                HEALTH_OK=1
                break
              fi
              sleep 2
            done
            if [ "$HEALTH_OK" -ne 1 ]; then
              pm2 status
              pm2 logs come2court-backend --lines 120 --nostream || true
              exit 1
            fi
