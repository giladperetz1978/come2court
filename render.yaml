services:
  - type: web
    name: come2court
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: REGISTRATION_LOCK_HOUR
        value: "20"
      - key: PORT
        value: "8787"
      - key: FRONTEND_ORIGIN
        value: "https://come2court.com,https://www.come2court.com,https://come2court.onrender.com,http://localhost:5173,http://127.0.0.1:5173"
    disk:
      name: come2court-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
